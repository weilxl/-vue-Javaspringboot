server:
  port: 8082
  servlet:
    context-path: /api

spring:
  application:
    name: efficiency-backend
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  datasource:
    url: jdbc:mysql://localhost:3306/efficiency_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: PersonalEfficiencySystemJwtSecretKey2026Secure
  expire-hours: 24

logging:
  level:
    com.efficiency: info
